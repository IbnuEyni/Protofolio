name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: us-central1-docker.pkg.dev/my-ocr-project-489212/portfolio-images

jobs:
  # ── Job 1: Frontend lint + type-check ───────────────────────────────────────
  lint-frontend:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Dependency audit
        run: npm audit --audit-level=critical --omit=dev
        working-directory: frontend

  # ── Job 2: Backend lint + security audit ────────────────────────────────────
  lint-backend:
    name: Backend — Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Install audit tools
        run: pip install --quiet bandit pip-audit

      - name: Bandit security lint
        run: bandit -r app/ --severity-level medium --confidence-level medium --format txt --exit-zero
        working-directory: backend

      - name: pip-audit
        run: pip-audit --requirement requirements.txt --strict
        working-directory: backend

  # ── Job 3: Dockerfile lint ───────────────────────────────────────────────────
  lint-dockerfiles:
    name: Dockerfile Lint (Hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning

  # ── Job 4: Build & Deploy ────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend, lint-dockerfiles]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: my-ocr-project-489212

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories describe portfolio-images \
            --location=us-central1 --quiet 2>/dev/null || \
          gcloud artifacts repositories create portfolio-images \
            --repository-format=docker \
            --location=us-central1 \
            --quiet

      - name: Build & push backend
        env:
          DOCKER_BUILDKIT: 1
          TAG: ${{ github.sha }}
        run: |
          docker build \
            --tag $REGISTRY/backend:${TAG:0:7} \
            --tag $REGISTRY/backend:latest \
            --cache-from $REGISTRY/backend:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            backend/
          docker push $REGISTRY/backend:${TAG:0:7}
          docker push $REGISTRY/backend:latest

      - name: Build & push frontend
        env:
          DOCKER_BUILDKIT: 1
          TAG: ${{ github.sha }}
        run: |
          docker build \
            --tag $REGISTRY/frontend:${TAG:0:7} \
            --tag $REGISTRY/frontend:latest \
            --cache-from $REGISTRY/frontend:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --build-arg NEXT_PUBLIC_API_URL="" \
            frontend/
          docker push $REGISTRY/frontend:${TAG:0:7}
          docker push $REGISTRY/frontend:latest

      - name: Deploy backend to Cloud Run
        env:
          TAG: ${{ github.sha }}
        run: |
          gcloud run deploy portfolio-backend \
            --image=$REGISTRY/backend:${TAG:0:7} \
            --region=us-central1 \
            --platform=managed \
            --service-account=portfolio-cloudrun-sa@my-ocr-project-489212.iam.gserviceaccount.com \
            --add-cloudsql-instances=my-ocr-project-489212:us-central1:portfolio-db \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,ADMIN_TOKEN=ADMIN_TOKEN:latest \
            --set-env-vars=FLASK_ENV=production \
            --min-instances=0 \
            --max-instances=4 \
            --memory=512Mi \
            --quiet

      - name: Deploy frontend to Cloud Run
        env:
          TAG: ${{ github.sha }}
        run: |
          BACKEND_URL=$(gcloud run services describe portfolio-backend \
            --region=us-central1 --format="value(status.url)")
          gcloud run deploy portfolio-frontend \
            --image=$REGISTRY/frontend:${TAG:0:7} \
            --region=us-central1 \
            --platform=managed \
            --service-account=portfolio-cloudrun-sa@my-ocr-project-489212.iam.gserviceaccount.com \
            --set-env-vars=NODE_ENV=production,BACKEND_URL=$BACKEND_URL,NEXT_TELEMETRY_DISABLED=1 \
            --min-instances=0 \
            --max-instances=4 \
            --memory=512Mi \
            --quiet

      - name: Print deployed URLs
        run: |
          BACKEND_URL=$(gcloud run services describe portfolio-backend \
            --region=us-central1 --format="value(status.url)")
          FRONTEND_URL=$(gcloud run services describe portfolio-frontend \
            --region=us-central1 --format="value(status.url)")
          echo "====================================="
          echo "Frontend : $FRONTEND_URL"
          echo "Backend  : $BACKEND_URL"
          echo "====================================="
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | $FRONTEND_URL |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend  | $BACKEND_URL |" >> $GITHUB_STEP_SUMMARY
