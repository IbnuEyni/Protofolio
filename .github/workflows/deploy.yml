# .github/workflows/deploy.yml
# =============================================================================
# CI/CD pipeline — GitHub Actions + GCP Cloud Build
#
# Responsibilities:
#   GitHub Actions  →  lint, type-check, security audit (fast feedback on PRs)
#   Cloud Build     →  build images, scan, deploy to Cloud Run (on main push)
#
# Authentication: Workload Identity Federation (no SA key files stored in GitHub)
#
# Required GitHub Secrets (set in Settings → Secrets → Actions):
#   GCP_PROJECT_ID          — GCP project ID
#   GCP_REGION              — e.g. us-central1
#   GCP_WORKLOAD_IDENTITY   — WIF provider resource name
#   GCP_SERVICE_ACCOUNT     — Cloud Build SA email
#   CLOUD_SQL_CONN          — PROJECT:REGION:INSTANCE
# =============================================================================

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even without code changes"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true   # cancel stale PR runs when new commits are pushed

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION:     ${{ secrets.GCP_REGION }}

jobs:
  # ── Job 1: Frontend lint + type-check ───────────────────────────────────────
  lint-frontend:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Dependency audit
        # Fail on high/critical severity vulnerabilities in npm packages
        run: npm audit --audit-level=high --omit=dev
        working-directory: frontend
        continue-on-error: false

  # ── Job 2: Backend lint + security audit ────────────────────────────────────
  lint-backend:
    name: Backend — Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Install audit tools
        run: pip install --quiet bandit pip-audit

      - name: Bandit — Python security linter
        # Checks for common security issues: SQL injection, hardcoded secrets, etc.
        run: |
          bandit -r app/ \
            --severity-level medium \
            --confidence-level medium \
            --format txt \
            --exit-zero
        working-directory: backend

      - name: pip-audit — dependency vulnerability scan
        run: pip-audit --requirement requirements.txt --strict
        working-directory: backend

  # ── Job 3: Dockerfile lint ───────────────────────────────────────────────────
  lint-dockerfiles:
    name: Dockerfile Lint (Hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning

  # ── Job 4: Trigger Cloud Build deploy (main branch only) ────────────────────
  trigger-cloud-build:
    name: Trigger Cloud Build
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend, lint-dockerfiles]
    # Only deploy on push to main or manual trigger — not on PRs
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Keyless authentication via Workload Identity Federation.
      # No SA key JSON stored in GitHub — uses short-lived OIDC tokens.
      - name: Authenticate to GCP (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Trigger Cloud Build
        id: build
        run: |
          BUILD_ID=$(gcloud builds submit \
            --no-source \
            --config=cloudbuild.yaml \
            --substitutions="_REGION=${REGION},SHORT_SHA=${GITHUB_SHA:0:7}" \
            --async \
            --format="value(id)")
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "▶ Cloud Build triggered: $BUILD_ID"
          echo "   View at: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID"

      - name: Wait for Cloud Build to complete
        run: |
          BUILD_ID="${{ steps.build.outputs.build_id }}"
          echo "▶ Waiting for build $BUILD_ID..."

          for i in $(seq 1 60); do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --format="value(status)" 2>/dev/null || echo "UNKNOWN")

            case "$STATUS" in
              SUCCESS)
                echo "✅ Cloud Build succeeded"
                exit 0
                ;;
              FAILURE|CANCELLED|TIMEOUT|INTERNAL_ERROR)
                echo "❌ Cloud Build failed with status: $STATUS"
                echo "   Logs: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID"
                exit 1
                ;;
              WORKING|QUEUED)
                echo "  [$i/60] Status: $STATUS — waiting 30s..."
                sleep 30
                ;;
              *)
                echo "  [$i/60] Unknown status: $STATUS — waiting 30s..."
                sleep 30
                ;;
            esac
          done

          echo "❌ Timed out waiting for Cloud Build (30 minutes)"
          exit 1

      - name: Print deployed URLs
        if: success()
        run: |
          BACKEND_URL=$(gcloud run services describe portfolio-backend \
            --region "$REGION" \
            --format="value(status.url)" 2>/dev/null || echo "unavailable")
          FRONTEND_URL=$(gcloud run services describe portfolio-frontend \
            --region "$REGION" \
            --format="value(status.url)" 2>/dev/null || echo "unavailable")

          echo "════════════════════════════════════════════════"
          echo "🚀 Deployment complete"
          echo "   Frontend : $FRONTEND_URL"
          echo "   Backend  : $BACKEND_URL"
          echo "   Commit   : ${GITHUB_SHA:0:7}"
          echo "════════════════════════════════════════════════"

          # Write to GitHub step summary
          {
            echo "## 🚀 Deployment Summary"
            echo "| Service  | URL |"
            echo "|----------|-----|"
            echo "| Frontend | $FRONTEND_URL |"
            echo "| Backend  | $BACKEND_URL |"
            echo "| Commit   | \`${GITHUB_SHA:0:7}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
