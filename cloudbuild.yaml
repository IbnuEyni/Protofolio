# =============================================================================
# cloudbuild.yaml  —  GCP Cloud Build pipeline
#
# Triggered by: push to `main` branch (configured in Cloud Build trigger UI
#               or via `gcloud builds triggers create github ...`)
#
# Pipeline stages (run in dependency order, parallel where possible):
#   1.  [parallel] Build backend image  +  Build frontend image
#   2.  [parallel] Push backend         +  Push frontend
#   3.  [parallel] Scan backend         +  Scan frontend  (Artifact Analysis)
#   4.  Deploy backend  →  Cloud Run
#   5.  Run DB migration  →  Cloud Run Job
#   6.  Deploy frontend  →  Cloud Run  (injects backend URL)
#   7.  Smoke test both services
#
# Substitution variables (set in Cloud Build trigger):
#   _REGION          — GCP region, e.g. us-central1
#   _ARTIFACT_REPO   — Artifact Registry repo name, e.g. portfolio-images
#   _CLOUD_SQL_CONN  — Cloud SQL connection name
#   _SA_EMAIL        — Cloud Run service account email
#
# Secrets (from Secret Manager, referenced by resource name):
#   DATABASE_URL, DEEPSEEK_API_KEY, ADMIN_TOKEN
# =============================================================================

substitutions:
  _REGION:         "us-central1"
  _ARTIFACT_REPO:  "portfolio-images"
  _CLOUD_SQL_CONN: "my-ocr-project-489212:us-central1:portfolio-db"
  _SA_EMAIL:       "portfolio-cloudrun-sa@my-ocr-project-489212.iam.gserviceaccount.com"
  _BACKEND_SVC:    "portfolio-backend"
  _FRONTEND_SVC:   "portfolio-frontend"
  _SHORT_SHA:      "latest"

# Make the short SHA available as a tag
tags: 
  - "commit-${_SHORT_SHA}"
  - "portfolio"

options:
  # Use a high-CPU machine for faster parallel builds
  machineType: "E2_HIGHCPU_8"
  # Stream logs to Cloud Logging in real time
  logging: CLOUD_LOGGING_ONLY
  # Substitution variables must all be defined
  substitutionOption: ALLOW_LOOSE
  # Dynamic substitutions allow my-ocr-project-489212 inside substitution values
  dynamicSubstitutions: false
  # Environment variables available to all steps
  env:
    - "REGION=${_REGION}"
    - "REPO=${_ARTIFACT_REPO}"
    - "REGISTRY=${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}"
    - "SHORT_SHA=${_SHORT_SHA}"

steps:

  # ── Step 1a: Build backend image ────────────────────────────────────────────
  - id: "build-backend"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["-"]   # start immediately (parallel with build-frontend)
    args:
      - "build"
      - "--file=backend/Dockerfile"
      - "--tag=${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/backend:${_SHORT_SHA}"
      - "--tag=${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/backend:latest"
      # Layer cache: pull the previous latest to reuse unchanged layers
      - "--cache-from=${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/backend:latest"
      - "--build-arg=BUILDKIT_INLINE_CACHE=1"
      - "backend"
    env:
      - "DOCKER_BUILDKIT=1"

  # ── Step 1b: Build frontend image ───────────────────────────────────────────
  - id: "build-frontend"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["-"]   # start immediately (parallel with build-backend)
    args:
      - "build"
      - "--file=frontend/Dockerfile"
      - "--tag=${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/frontend:${_SHORT_SHA}"
      - "--tag=${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/frontend:latest"
      - "--cache-from=${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/frontend:latest"
      - "--build-arg=BUILDKIT_INLINE_CACHE=1"
      - "--build-arg=NEXT_PUBLIC_API_URL="
      - "frontend"
    env:
      - "DOCKER_BUILDKIT=1"

  # ── Step 2a: Push backend ────────────────────────────────────────────────────
  - id: "push-backend"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["build-backend"]
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/backend"

  # ── Step 2b: Push frontend ───────────────────────────────────────────────────
  - id: "push-frontend"
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["build-frontend"]
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/frontend"

  # ── Step 3a: Vulnerability scan — backend ────────────────────────────────────
  # Uses GCP Artifact Analysis (Container Scanning API).
  # The build FAILS if any CRITICAL CVEs are found.
  - id: "scan-backend"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    waitFor: ["push-backend"]
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        IMG="${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/backend:${_SHORT_SHA}"
        echo "▶ Waiting for vulnerability scan to complete..."
        # Poll until the scan finishes (up to 5 minutes)
        for i in $(seq 1 30); do
          STATUS=$(gcloud artifacts docker images describe "$IMG" \
            --show-package-vulnerability \
            --format="value(vulnerability_summary.severity_counts.CRITICAL)" \
            2>/dev/null || echo "PENDING")
          if [ "$STATUS" != "PENDING" ] && [ "$STATUS" != "" ]; then
            break
          fi
          echo "  Scan pending... ($i/30)"
          sleep 10
        done
        CRITICAL=$(gcloud artifacts docker images describe "$IMG" \
          --show-package-vulnerability \
          --format="value(vulnerability_summary.severity_counts.CRITICAL)" \
          2>/dev/null || echo "0")
        echo "Critical CVEs found: ${CRITICAL:-0}"
        if [ "${CRITICAL:-0}" -gt "0" ]; then
          echo "❌ CRITICAL vulnerabilities detected. Blocking deployment."
          exit 1
        fi
        echo "✅ No critical vulnerabilities in backend image."

  # ── Step 3b: Vulnerability scan — frontend ───────────────────────────────────
  - id: "scan-frontend"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    waitFor: ["push-frontend"]
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        IMG="${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/frontend:${_SHORT_SHA}"
        echo "▶ Waiting for vulnerability scan to complete..."
        for i in $(seq 1 30); do
          STATUS=$(gcloud artifacts docker images describe "$IMG" \
            --show-package-vulnerability \
            --format="value(vulnerability_summary.severity_counts.CRITICAL)" \
            2>/dev/null || echo "PENDING")
          if [ "$STATUS" != "PENDING" ] && [ "$STATUS" != "" ]; then
            break
          fi
          echo "  Scan pending... ($i/30)"
          sleep 10
        done
        CRITICAL=$(gcloud artifacts docker images describe "$IMG" \
          --show-package-vulnerability \
          --format="value(vulnerability_summary.severity_counts.CRITICAL)" \
          2>/dev/null || echo "0")
        echo "Critical CVEs found: ${CRITICAL:-0}"
        if [ "${CRITICAL:-0}" -gt "0" ]; then
          echo "❌ CRITICAL vulnerabilities detected. Blocking deployment."
          exit 1
        fi
        echo "✅ No critical vulnerabilities in frontend image."

  # ── Step 4: Deploy backend to Cloud Run ──────────────────────────────────────
  - id: "deploy-backend"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    waitFor: ["scan-backend"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_BACKEND_SVC}"
      - "--image=${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/backend:${_SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      # Service account with least-privilege roles
      - "--service-account=${_SA_EMAIL}"
      # Cloud SQL Auth Proxy — Unix socket, no TCP, no password over network
      - "--add-cloudsql-instances=${_CLOUD_SQL_CONN}"
      # Secrets injected as env vars from Secret Manager (never in image)
      - "--set-secrets=DATABASE_URL=DATABASE_URL:latest,DEEPSEEK_API_KEY=DEEPSEEK_API_KEY:latest,ADMIN_TOKEN=ADMIN_TOKEN:latest"
      # Non-secret env vars
      - "--set-env-vars=FLASK_ENV=production,PYTHONDONTWRITEBYTECODE=1,PYTHONUNBUFFERED=1"
      # Scaling — min 0 for cost, max 4 for burst
      - "--min-instances=0"
      - "--max-instances=4"
      # Concurrency — matches gunicorn workers×threads
      - "--concurrency=80"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--timeout=60"
      # Traffic: send 100% to new revision only after health checks pass
      - "--no-traffic"
      # Only allow HTTPS (Cloud Run enforces this, but explicit is better)
      - "--ingress=all"
      - "--quiet"

  # ── Step 5: Migrate / seed database ──────────────────────────────────────────
  # Runs seed.py as a Cloud Run Job — same image, same Cloud SQL connection.
  # Idempotent: seed.py should use INSERT ... ON CONFLICT DO NOTHING.
  - id: "migrate-db"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    waitFor: ["deploy-backend"]
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        IMG="${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/backend:${_SHORT_SHA}"

        # Create or update the migration job
        if gcloud run jobs describe portfolio-migrate --region="${_REGION}" --quiet 2>/dev/null; then
          gcloud run jobs update portfolio-migrate \
            --image="$IMG" \
            --region="${_REGION}" \
            --quiet
        else
          gcloud run jobs create portfolio-migrate \
            --image="$IMG" \
            --region="${_REGION}" \
            --service-account="${_SA_EMAIL}" \
            --set-cloudsql-instances="${_CLOUD_SQL_CONN}" \
            --set-secrets="DATABASE_URL=DATABASE_URL:latest" \
            --set-env-vars="FLASK_ENV=production" \
            --command="python" \
            --args="seed.py" \
            --max-retries=1 \
            --memory=512Mi \
            --cpu=1 \
            --quiet
        fi

        echo "▶ Executing migration job..."
        gcloud run jobs execute portfolio-migrate \
          --region="${_REGION}" \
          --wait \
          --quiet
        echo "✅ Migration complete."

  # ── Step 6: Shift traffic to new backend revision ────────────────────────────
  - id: "promote-backend"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    waitFor: ["migrate-db"]
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        # Get the latest revision name
        REVISION=$(gcloud run revisions list \
          --service="${_BACKEND_SVC}" \
          --region="${_REGION}" \
          --format="value(name)" \
          --sort-by="~createTime" \
          --limit=1)
        echo "▶ Promoting revision: $REVISION"
        gcloud run services update-traffic "${_BACKEND_SVC}" \
          --region="${_REGION}" \
          --to-revisions="$REVISION=100" \
          --quiet
        BACKEND_URL=$(gcloud run services describe "${_BACKEND_SVC}" \
          --region="${_REGION}" \
          --format="value(status.url)")
        echo "✅ Backend live at: $BACKEND_URL"
        # Write URL to workspace for the next step
        echo "$BACKEND_URL" > /workspace/backend_url.txt

  # ── Step 7: Deploy frontend to Cloud Run ─────────────────────────────────────
  - id: "deploy-frontend"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    waitFor: ["scan-frontend", "promote-backend"]
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        echo "▶ Deploying frontend with BACKEND_URL=$BACKEND_URL"

        gcloud run deploy "${_FRONTEND_SVC}" \
          --image="${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/frontend:${_SHORT_SHA}" \
          --region="${_REGION}" \
          --platform=managed \
          --service-account="${_SA_EMAIL}" \
          --set-env-vars="NODE_ENV=production,BACKEND_URL=$BACKEND_URL,NEXT_TELEMETRY_DISABLED=1" \
          --min-instances=0 \
          --max-instances=4 \
          --concurrency=80 \
          --cpu=1 \
          --memory=512Mi \
          --timeout=60 \
          --ingress=all \
          --quiet

        FRONTEND_URL=$(gcloud run services describe "${_FRONTEND_SVC}" \
          --region="${_REGION}" \
          --format="value(status.url)")
        echo "✅ Frontend live at: $FRONTEND_URL"
        echo "$FRONTEND_URL" > /workspace/frontend_url.txt

  # ── Step 8: Make services publicly accessible ─────────────────────────────────
  - id: "set-iam-public"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    waitFor: ["deploy-frontend"]
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        for SVC in "${_BACKEND_SVC}" "${_FRONTEND_SVC}"; do
          gcloud run services add-iam-policy-binding "$SVC" \
            --region="${_REGION}" \
            --member="allUsers" \
            --role="roles/run.invoker" \
            --quiet
          echo "✅ Public access set for $SVC"
        done

  # ── Step 9: Smoke tests ───────────────────────────────────────────────────────
  - id: "smoke-test"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    waitFor: ["set-iam-public"]
    entrypoint: "bash"
    args:
      - "-euo"
      - "pipefail"
      - "-c"
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        FRONTEND_URL=$(cat /workspace/frontend_url.txt)

        echo "▶ Smoke testing backend health endpoint..."
        for i in 1 2 3; do
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "$BACKEND_URL/api/health" || echo "000")
          if [ "$HTTP" = "200" ]; then
            echo "✅ Backend healthy (HTTP $HTTP)"
            break
          fi
          echo "  Attempt $i: HTTP $HTTP — retrying in 5s..."
          sleep 5
        done
        [ "$HTTP" = "200" ] || (echo "❌ Backend health check failed" && exit 1)

        echo "▶ Smoke testing frontend..."
        for i in 1 2 3; do
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" "$FRONTEND_URL" || echo "000")
          if [ "$HTTP" = "200" ]; then
            echo "✅ Frontend healthy (HTTP $HTTP)"
            break
          fi
          echo "  Attempt $i: HTTP $HTTP — retrying in 5s..."
          sleep 5
        done
        [ "$HTTP" = "200" ] || (echo "❌ Frontend health check failed" && exit 1)

        echo ""
        echo "════════════════════════════════════════════════════"
        echo "🚀 Deployment successful"
        echo "   Commit   : ${_SHORT_SHA}"
        echo "   Backend  : $BACKEND_URL"
        echo "   Frontend : $FRONTEND_URL"
        echo "════════════════════════════════════════════════════"

# Images to push to Artifact Registry (Cloud Build tracks these for provenance)
images:
  - "${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/backend:${_SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/backend:latest"
  - "${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/frontend:${_SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/my-ocr-project-489212/${_ARTIFACT_REPO}/frontend:latest"

# Total build timeout — 30 minutes is generous for two image builds + deploy
timeout: "1800s"
